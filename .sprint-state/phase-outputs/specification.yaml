acs:
  - id: AC-01
    description: "xp-gate uninstall 在 local 模式下完整清理 hooks + adapters"
    test: "init → uninstall → 验证文件不存在"

  - id: AC-02
    description: "xp-gate uninstall 在 global 模式下 unset core.hooksPath"
    test: "init --global → uninstall → 验证 git config core.hooksPath 已 remove"

  - id: AC-03
    description: "xp-gate uninstall --dry-run 不修改任何文件"
    test: "dry-run → 验证所有文件仍在"

  - id: AC-04
    description: "非 xp-gate 的 hooks 文件不被误删"
    test: "创建自定义 pre-commit → uninstall → 验证仍在"

  - id: AC-05
    description: "xp-gate doctor 正确诊断健康/损坏状态"
    test: "完整安装 → doctor → 输出包含所有 checks ✓"

  - id: AC-06
    description: "xp-gate migrate 清理 ~/.npmrc 中的 PAT 行"
    test: "mock ~/.npmrc → migrate --dry-run → 验证"

  - id: AC-07
    description: "文档与实现一致"
    test: "手动验证 README/CHANGELOG"

  - id: AC-08
    description: "卸载中途失败后 doctor 可检测不完整状态"
    test: "mock 权限错误 → uninstall → doctor 输出包含 partial uninstall 信息"

  - id: AC-09
    description: "已卸载状态下再次 uninstall 输出干净信息（幂等）"
    test: "uninstall 两次 → 第二次输出 'No xp-gate installation found'"

  - id: AC-10
    description: "doctor --fix 仅在 mode === active 时执行修复"
    test: "设置 mode=uninstalled → doctor --fix → 不执行修复"

  - id: AC-11
    description: "Manifest 存在时 uninstall 使用 sha256 而非仅特征字符串"
    test: "init → 修改 manifest sha256 → uninstall --dry-run → 显示 fallback 到 signature 检测"

risks:
  - id: R-01
    description: "uninstall 误删用户自定义 hooks"
    mitigation: "manifest sha256 验证 + 特征字符串 fallback + dry-run 预览"

  - id: R-02
    description: "global uninstall 影响其他项目"
    mitigation: "明确提示 + 确认步骤 + core.hooksPath 值匹配检查"

  - id: R-03
    description: "migrate 清理 PAT 影响其他 registry"
    mitigation: "仅匹配 //npm.pkg.github.com/:_authToken= 行"

  - id: R-04
    description: "部分失败导致不一致状态"
    mitigation: "pre-delete backup + 操作重排序 + 幂等重试 + doctor 诊断"
