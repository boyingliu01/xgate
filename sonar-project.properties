sonar.projectKey=xp-gate
sonar.projectName=XP-Gate
sonar.sources=src/,githooks/
sonar.tests=src/__tests__/
sonar.exclusions=**/__tests__/**,**/*.test.ts,**/*.spec.ts,**/node_modules/**,**/coverage/**,**/dist/**,**/promptfoo/**,**/promptpressure/**
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.language=ts
sonar.sourceEncoding=UTF-8
sonar.qualitygate.wait=true
sonar.security.hotspots.reviewed=true
sonar.newCode.fromCode=on_the_pull_request
