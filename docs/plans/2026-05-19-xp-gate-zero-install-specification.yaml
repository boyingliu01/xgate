## Overview

XP-Gate Zero-Install enables AI agents to use XP-Gate without cloning the repository:

```bash
npm install -g xp-gate                    # install core (hooks + CLI)
xp-gate init                             # initialize project
xp-gate install-skill sprint-flow        # install Skill on-demand
xp-gate update-skill sprint-flow         # update Skill
xp-gate uninstall-skill sprint-flow      # remove Skill
```

## Package Structure

```json
{
  "name": "xp-gate",
  "version": "1.0.0",
  "bin": { "xp-gate": "./bin/xp-gate.js" },
  "files": ["bin/", "hooks/", "adapters/", "lib/"],
  "repository": { "type": "git", "url": "https://github.com/boyingliu01/xp-gate" },
  "publishConfig": { "registry": "https://npm.pkg.github.com" }
}
```

## CLI Commands

| Command | Description |
|---------|-----------|
| `xp-gate init` | Initialize project, detect deps, guide user |
| `xp-gate install-skill <name>[@<version>]` | Install Skill from GitHub |
| `xp-gate update-skill <name>` | Update Skill to latest/specified version |
| `xp-gate uninstall-skill <name>` | Remove Skill |
| `xp-gate --version` | Show version |
| `xp-gate --help` | Show help |

## Requirements

### Core Requirements

- id: REQ-ZI-001
  description: Install xp-gate core without git clone
  priority: MUST
  acceptance_criteria:
    - id: AC-ZI-001-01
      given: A machine with npm installed
      when: User runs `npm install -g xp-gate`
      then: xp-gate CLI is available and `xp-gate --version` shows version

    - id: AC-ZI-001-02
      given: xp-gate installed
      when: User runs `xp-gate init`
      then: Hooks are installed to .git/hooks/ and OpenCode template

### Skill Installation Requirements

- id: REQ-ZI-002
  description: Install Skills on-demand from GitHub
  priority: MUST
  acceptance_criteria:
    - id: AC-ZI-002-01
      given: xp-gate installed, GitHub accessible
      when: User runs `xp-gate install-skill sprint-flow`
      then: SKILL.md is downloaded and installed to ~/.config/opencode/skills/sprint-flow/

    - id: AC-ZI-002-02
      given: xp-gate installed, GitHub not accessible
      when: User runs `xp-gate install-skill sprint-flow --offline`
      then: Skill is installed from local cache if available

    - id: AC-ZI-002-03
      given: xp-gate installed
      when: User runs `xp-gate install-skill sprint-flow@1.0.0`
      then: Specific version is installed

### Dependency Detection Requirements

- id: REQ-ZI-003
  description: Detect superpowers/gstack dependencies before Skill install
  priority: MUST
  acceptance_criteria:
    - id: AC-ZI-003-01
      given: xp-gate installed, superpowers not installed
      when: User runs `xp-gate install-skill sprint-flow`
      then: Error shown with instructions to install superpowers

    - id: AC-ZI-003-02
      given: xp-gate installed, superpowers version incompatible
      when: User runs `xp-gate install-skill sprint-flow`
      then: Error shown with required minimum version

### Error Handling Requirements

- id: REQ-ZI-004
  description: Robust error handling with rollback
  priority: MUST
  acceptance_criteria:
    - id: AC-ZI-004-01
      given: Network timeout during install
      when: xp-gate install-skill runs
      then: Retry 3 times, then error with helpful message

    - id: AC-ZI-004-02
      given: Checksum mismatch after download
      when: xp-gate install-skill runs
      then: Delete corrupted file, show error

    - id: AC-ZI-004-03
      given: Install failure
      when: xp-gate install-skill runs
      then: Rollback to previous state, clean temp files

### Update/Uninstall Requirements

- id: REQ-ZI-005
  description: Update and uninstall Skills
  priority: MUST
  acceptance_criteria:
    - id: AC-ZI-005-01
      given: Sprint-flow installed
      when: User runs `xp-gate update-skill sprint-flow`
      then: Sprint-flow is updated to latest version

    - id: AC-ZI-005-02
      given: Sprint-flow installed
      when: User runs `xp-gate uninstall-skill sprint-flow`
      then: Sprint-flow is removed and cache is cleaned

## Design Decisions

### DD-ZI-01: Distribution Method

Choice: npm global package + on-demand Skill download
Rationale: Minimizes initial install size, AI agents only fetch what's needed

### DD-ZI-02: Version Management

Choice: semver with compatibility matrix
Rationale: Predictable versioning, clear compatibility guarantees

| xp-gate | Skills |
|-------|-------|
| 1.0.x | 1.0.x |
| 1.1.x | 1.0.x, 1.1.x |
| 2.0.x | 2.0.x (breaking) |

### DD-ZI-03: Dependency Detection Timing

Choice: Detect once at `xp-gate init`, not at each Skill install
Rationale: Avoids repeated detection overhead, simpler UX

### DD-ZI-04: Offline Support

Choice: Local cache at ~/.config/xp-gate/cache/
Rationale: Enables offline Skill install after initial download

## File Locations

| Path | Description |
|------|------------|
| `~/.config/xp-gate/xp-gate.json` | Config (installed skills, version) |
| `~/.config/xp-gate/cache/` | Offline cache |
| `~/.config/xp-gate/backup/<id>/` | Rollback backups |
| `~/.config/opencode/skills/<name>/` | Installed Skills |
| `.git/hooks/` | Project hooks |
| `~/.config/opencode/git-hooks-template/` | OpenCode global template |

## Skills Registry

| Skill | GitHub Path | Description |
|-------|------------|-----------|
| sprint-flow | `skills/sprint-flow/` | Full sprint pipeline |
| delphi-review | `skills/delphi-review/` | Multi-expert consensus |
| test-spec | `skills/test-spec/` | Test-spec alignment |
| ralph-loop | `skills/ralph-loop/` | REQ-level iteration |

