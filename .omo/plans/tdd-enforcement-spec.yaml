  # ============================================================
  # Rollback Strategy
  # ============================================================
  rollback_strategy:
    - condition: "Gate 5 pairing check causes too many false positives"
      action: "Can be disabled via package.json setting tdd-pairing-check false"
      default: "Enabled (zero tolerance)"

    - condition: "Mock density thresholds prove unreasonable"
      action: "Adjust via XP_GATE_MOCK_DENSITY_WARNING and XP_GATE_MOCK_DENSITY_BLOCK environment variables"

  # ============================================================
  # Layered Test Strategy
  # ============================================================
  test_strategy:
    integration_tests:
      default: true
      scenarios: "Business logic, DB operations, state machines"
      mock_allowed: false
      tools: "sqlite-in-memory, tmpdir, real collaborators"

    boundary_integration:
      scenarios: "HTTP calls, file system"
      mock_allowed: true
      scope: "boundary only"
      tools: "testcontainers, nock, memfs"

    pure_mock:
      scenarios: "External uncontrollable services, time-dependent code"
      mock_allowed: true
      requirement: "@mock-justified required"
      tools: "jest.mock, vi.fn, spy"
